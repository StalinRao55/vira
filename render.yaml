services:
  - type: web
    name: vira-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -e .
    preDeployCommand: alembic upgrade head
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: vira-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: vira-redis
          type: keyvalue
          property: connectionString
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        value: https://vira-backend.onrender.com/auth/callback/google
      - key: FRONTEND_URL
        value: https://vira-frontend.onrender.com

  - type: web
    name: vira-frontend
    runtime: node
    plan: free
    rootDir: frontend
    buildCommand: npm ci && npm run build
    startCommand: npm start -- -p $PORT
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://vira-backend.onrender.com/api/v1

  - type: keyvalue
    name: vira-redis
    plan: free
    ipAllowList: []

databases:
  - name: vira-postgres
    databaseName: vira
    user: vira
    plan: free
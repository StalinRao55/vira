name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: vira
          POSTGRES_PASSWORD: vira
          POSTGRES_DB: vira_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U vira"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: backend
        run: pip install --break-system-packages -e ".[dev]"

      - name: Run unit + integration tests
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://vira:vira@localhost:5432/vira_test
          JWT_SECRET_KEY: ci_test_secret_key
          ENVIRONMENT: test
        run: pytest tests/ -v --cov=app --cov-report=term-missing

  frontend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm install --no-audit --no-fund

      - name: Type check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Run tests
        working-directory: frontend
        run: npm test

      - name: Production build
        working-directory: frontend
        run: npm run build

  build-images:
    needs: [backend-tests, frontend-tests]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t vira-backend:${{ github.sha }} ./backend

      - name: Build frontend image
        run: docker build -t vira-frontend:${{ github.sha }} ./frontend

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push images to registry
        run: |
          docker tag vira-backend:${{ github.sha }} ${{ secrets.DOCKER_REGISTRY }}/vira-backend:latest
          docker tag vira-frontend:${{ github.sha }} ${{ secrets.DOCKER_REGISTRY }}/vira-frontend:latest
          docker push ${{ secrets.DOCKER_REGISTRY }}/vira-backend:latest
          docker push ${{ secrets.DOCKER_REGISTRY }}/vira-frontend:latest

  deploy-render:
    needs: build-images
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Render
        run: |
          curl https://api.render.com/deploy/srv-${{ secrets.RENDER_SERVICE_ID }}?key=${{ secrets.RENDER_API_KEY }} -X POST
